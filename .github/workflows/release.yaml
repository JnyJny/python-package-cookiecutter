name: Test and Release Template

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  get-python-versions:
    name: Get Python test versions from pyproject.toml
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.extract.outputs.versions }}
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync
      - name: Extract Python test versions
        id: extract
        run: |
          # Try to extract test versions from pyproject.toml, fallback to default if missing
          if versions=$(uv run toml get --toml-path pyproject.toml tool.python-package-cookiecutter.ci.test-python-versions 2>/dev/null); then
            echo "Using Python versions from pyproject.toml: $versions"
            echo "versions=$versions" >> $GITHUB_OUTPUT
          else
            echo "No test-python-versions found in pyproject.toml, using default versions"
            echo 'versions=["3.11", "3.12", "3.13"]' >> $GITHUB_OUTPUT
          fi

  test:
    name: Test Template
    needs: get-python-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(needs.get-python-versions.outputs.python-versions) }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure git for tests
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:          
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run fast test suite
        run: uv run poe test_fast

  github-release:
    name: Create GitHub Release & Update Changelog
    needs: test
    if: |
      github.ref_type == 'tag' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !endsWith(github.ref, '-test') &&
      success()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: pip install git-cliff

      - name: Generate release notes for this tag
        run: git cliff --latest --strip header > release_notes.md

      - name: Update CHANGELOG.md
        run: git cliff --output CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs(CHANGELOG): update release notes"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          bodyFile: "release_notes.md"
          draft: false
          prerelease: false
          generateReleaseNotes: false
          token: ${{ secrets.GITHUB_TOKEN }}