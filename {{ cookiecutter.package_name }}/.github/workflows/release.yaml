name: Test, Publish and Release

on:
  push:
    branches:
      - testing
    tags:
      - 'v*-test'
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  get-python-versions:
    name: Get Python test versions from pyproject.toml
    runs-on: ubuntu-latest
    outputs:
      python-versions: {% raw %}${{ steps.extract.outputs.versions }}{% endraw %}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Extract Python test versions
        id: extract
        run: |
          # Try to extract test versions from pyproject.toml, fallback to default if missing
          if versions=$(uv run toml get --toml-path pyproject.toml tool.{{ cookiecutter.package_name }}.ci.test-python-versions 2>/dev/null); then
            echo "Using Python versions from pyproject.toml: $versions"
            echo "versions=$versions" >> $GITHUB_OUTPUT
          else
            echo "No test-python-versions found in pyproject.toml, using default versions"
            echo 'versions={{ cookiecutter.python_testing_matrix }}' >> $GITHUB_OUTPUT
          fi

  test:
    name: Test
    needs: get-python-versions
{%- raw %}
    runs-on: ${{ matrix.os }}
{%- endraw %}
    strategy:
      fail-fast: false
      matrix:
        os: [ {{ cookiecutter.os_testing_matrix }} ]
        python-version: {% raw %}${{ fromJSON(needs.get-python-versions.outputs.python-versions) }}{% endraw %}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv and set Python version.
        uses: astral-sh/setup-uv@v6
        with:
{%- raw %}          
          python-version: ${{ matrix.python-version }}
{%- endraw %}
          enable-cache: true

{% raw %}
      - name: Run tests - ${{ matrix.python-version }} - ${{ matrix.os }}
{%- endraw %}        
        run: |
          uv run --all-extras pytest

  build:
    name: Build Package
    needs: test
    if: |
      github.ref_type == 'tag' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !endsWith(github.ref, '-test') &&
      success()
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build package
        run: |
          uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: dist/
          retention-days: 1  # Minimum allowed, but artifacts are only needed within same workflow

  publish:
    name: Publish to PyPI
    needs: build
    if: |
      github.ref_type == 'tag' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !endsWith(github.ref, '-test') &&
      success()
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/{{ cookiecutter.package_name }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release & Update Changelog
    needs: build
    if: |
      github.ref_type == 'tag' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !endsWith(github.ref, '-test') &&
      success()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Install git-cliff
        run: pip install git-cliff

      - name: Generate release notes for this tag
        run: git cliff --latest --strip header > release_notes.md

      - name: Update CHANGELOG.md
        run: git cliff --output CHANGELOG.md

      - name: Commit updated CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs(CHANGELOG): update release notes"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          bodyFile: "release_notes.md"
          draft: false
          prerelease: false
          generateReleaseNotes: false
          token: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}

  deploy-docs:
    name: Deploy Documentation
    needs: [publish, github-release]
    if: |
      github.ref_type == 'tag' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !endsWith(github.ref, '-test') &&
      success()
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger docs deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: {% raw %}${{ secrets.GITHUB_TOKEN }}{% endraw %}
          event-type: release-complete
          client-payload: '{"ref": "{% raw %}${{ github.ref }}{% endraw %}", "sha": "{% raw %}${{ github.sha }}{% endraw %}"}'


